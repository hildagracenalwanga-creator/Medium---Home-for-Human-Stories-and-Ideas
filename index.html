<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Character encoding for all languages/emojis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CRITICAL for mobile responsiveness -->
    <title>Medium - Human stories & ideas</title>
    <!-- Appears in browser tab -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&display=swap"
      rel="stylesheet"
    />
    <!-- Google Font: Fraunces for headings -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="style.css" />
    <!-- External CSS - main stylesheet -->
  </head>
  <body>
    <!-- ========== HEADER - Fixed navigation bar ========== -->
    <header>
      <nav>
        <div class="logo">
          <!-- Logo - left side -->
          <a href="#">Medium</a>
          <!-- Anchor tag - links to homepage (placeholder) -->
        </div>

        <ul class="nav-links">
          <!-- Navigation links - right side -->
          <li><a href="#">Our story</a></li>
          <li><a href="#">Membership</a></li>
          <li><a href="#" class="write-link">Write</a></li>
          <!-- Green to match Medium brand -->
          <li>
            <!-- Sign In Dropdown -->
            <div class="dropdown">
              <button class="dropdown-btn">
                <!-- Button toggles dropdown -->
                Sign in <i class="fas fa-chevron-down"></i>
                <!-- Down arrow icon -->
              </button>
              <div class="dropdown-content">
                <!-- Hidden by default -->
                <a href="#"><i class="fas fa-envelope"></i> Email</a>
                <a href="#"><i class="fab fa-google"></i> Google</a>
                <a href="#"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="#"><i class="fab fa-twitter"></i> Twitter</a>
                <hr />
                <!-- Horizontal line separator -->
                <a href="#"><i class="fas fa-user-plus"></i> Create account</a>
              </div>
            </div>
          </li>
          <li><button class="btn btn-primary">Get started</button></li>
          <!-- Primary call to action -->
        </ul>

        <div class="hamburger" id="hamburger">
          <!-- Visible only on mobile -->
          <i class="fas fa-bars"></i>
          <!-- Three-line menu icon -->
        </div>
      </nav>
    </header>

    <!-- ========== HERO SECTION - Main banner ========== -->
    <section class="hero">
      <div class="hero-content">
        <!-- Text on left -->
        <h1>Human<br />stories &amp; ideas</h1>
        <!-- <br> creates line break -->
        <p class="hero-subtitle">
          A place to read, write, and deepen your understanding
        </p>
        <div class="hero-buttons">
          <button class="btn btn-primary btn-large">Start reading</button>
          <!-- Primary button -->
        </div>
      </div>

      <div class="hero-image-wrapper">
        <!-- Illustration on right -->
        <img
          src="https://miro.medium.com/v2/format:webp/4*SdjkdS98aKH76I8eD0_qjw.png"
          alt="Medium illustration showing human connection"
          class="hero-image"
        />
        <!-- Image from Medium's library -->
      </div>
    </section>

    <!-- ========== FOOTER - Links ========== -->
    <footer>
      <div class="footer-content">
        <div class="footer-links">
          <a href="#">Help</a>
          <a href="#">Status</a>
          <a href="#">About</a>
          <a href="#">Careers</a>
          <a href="#">Press</a>
          <a href="#">Blog</a>
          <a href="#">Store</a>
          <a href="#">Privacy</a>
          <a href="#">Rules</a>
          <a href="#">Terms</a>
          <a href="#">Text to speech</a>
        </div>
      </div>
    </footer>

    <!-- ========== JAVASCRIPT - Interactive functionality ========== -->
    <script>
      // Dropdown toggle - shows/hides on button click
      document
        .querySelector(".dropdown-btn")
        .addEventListener("click", function (e) {
          e.stopPropagation(); // Prevents immediate closing
          this.nextElementSibling.classList.toggle("show");
        });

      // Close dropdown when clicking outside
      window.addEventListener("click", function (e) {
        if (
          !e.target.matches(".dropdown-btn") &&
          !e.target.matches(".dropdown-btn i")
        ) {
          document.querySelectorAll(".dropdown-content").forEach((dropdown) => {
            dropdown.classList.remove("show");
          });
        }
      });

      // Hamburger menu toggle for mobile
      document
        .getElementById("hamburger")
        .addEventListener("click", function () {
          document.querySelector(".nav-links").classList.toggle("active");
        });
    </script>
  </body>
</html>
